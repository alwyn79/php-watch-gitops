apiVersion: v1
kind: ConfigMap
metadata:
  name: faro-alloy-config
  namespace: monitoring
data:
  config.alloy: |
    faro.receiver "default" {
      server {
        listen_address = "0.0.0.0"
        listen_port    = 12348
        cors_allowed_origins = ["*"]
      }

      output {
        logs = [loki.process.faro.receiver]
      }
    }

    loki.process "faro" {
      stage.static_labels {
        values = {
          app  = "chronos-watch-shop",
          job  = "faro",
          env  = "production",
        }
      }
      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://loki:3100/loki/api/v1/push"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: faro-collector
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: faro-collector
  template:
    metadata:
      labels:
        app: faro-collector
    spec:
      containers:
      - name: faro-collector
        image: grafana/alloy:latest
        args:
          - run
          - --server.http.listen-addr=0.0.0.0:12347
          - --storage.path=/tmp/alloy
          - /etc/alloy/config.alloy
        ports:
        - containerPort: 12348
          name: faro
        - containerPort: 12347
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/alloy
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: faro-alloy-config
---
apiVersion: v1
kind: Service
metadata:
  name: faro-collector
  namespace: monitoring
spec:
  selector:
    app: faro-collector
  ports:
  - name: faro
    port: 12348
    targetPort: 12348
    nodePort: 32348
  - name: http
    port: 12347
    targetPort: 12347
    nodePort: 32347
  type: NodePort