apiVersion: v1
kind: ConfigMap
metadata:
  name: traffic-script
  namespace: watch-app
data:
  generate-traffic.sh: |
    #!/bin/bash
    echo "Starting comprehensive traffic generation..."
    
    while true; do
      # Homepage
      curl -s http://php-watch/ > /dev/null
      
      # Products pages
      curl -s http://php-watch/products > /dev/null
      curl -s "http://php-watch/products?search=watch" > /dev/null
      curl -s "http://php-watch/products?category=1" > /dev/null
      
      # Product detail pages (IDs 1-10)
      for i in {1..10}; do
        curl -s http://php-watch/product/$i > /dev/null
      done
      
      # User routes
      curl -s http://php-watch/login > /dev/null
      curl -s http://php-watch/register > /dev/null
      curl -s http://php-watch/user/orders > /dev/null
      curl -s http://php-watch/user/profile > /dev/null
      curl -s http://php-watch/user/wishlist > /dev/null
      
      # Cart routes
      curl -s http://php-watch/cart > /dev/null
      curl -s http://php-watch/checkout > /dev/null
      
      # Static assets (generates different routes)
      curl -s http://php-watch/favicon.ico > /dev/null
      curl -s http://php-watch/css/style.css > /dev/null
      curl -s http://php-watch/js/main.js > /dev/null
      
      # POST requests (login/register)
      curl -s -X POST http://php-watch/login \
        -d "username=testuser&password=test123" > /dev/null
      
      curl -s -X POST http://php-watch/register \
        -d "username=newuser&email=test@test.com&password=test123" > /dev/null
      
      # Add to cart (POST)
      curl -s -X POST http://php-watch/cart/add \
        -d "product_id=1&quantity=1" > /dev/null
      
      echo "Traffic batch completed - $(date)"
      sleep 5
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-generator-full
  namespace: watch-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator-full
  template:
    metadata:
      labels:
        app: traffic-generator-full
    spec:
      containers:
      - name: traffic
        image: curlimages/curl:latest
        command: ["/bin/sh", "/scripts/generate-traffic.sh"]
        volumeMounts:
        - name: script
          mountPath: /scripts
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: script
        configMap:
          name: traffic-script
          defaultMode: 0755